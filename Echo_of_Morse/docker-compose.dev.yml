# Docker Compose configuration for Transcendence project - DEVELOPMENT
# Architecture: Browser -> localhost:3000 -> Next.js container -> db:5432 -> PostgreSQL container

services:

  # PostgreSQL database container
  db:
    image: postgres:15
    container_name: transcendence_db_dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - transcendence_network

  # Next.js application container - dev mode with hot reload
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: transcendence_web_dev
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - .:/app                # Bind mount - code changes reflect immediately
      - /app/node_modules     # Keep container's node_modules
    depends_on:
      - db
    networks:
      - transcendence_network


  ws:
    build: ./ws-server
    ports:
      - "3001:3001"

volumes:
  postgres_data_dev:

networks:
  transcendence_network:
    driver: bridge
